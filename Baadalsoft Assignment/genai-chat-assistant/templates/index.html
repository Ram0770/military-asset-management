<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NimbusDesk AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">RAG-Powered Support</p>
        <h1>NimbusDesk Assistant</h1>
      </div>
      <div class="topbar-actions">
        <span id="sessionBadge" class="session-badge">Session: Loading...</span>
        <button id="newChatBtn" class="btn btn-secondary" type="button">New Chat</button>
      </div>
    </header>

    <section class="chat-card">
      <div id="messages" class="messages" aria-live="polite">
        <article class="message assistant">
          <div class="message-meta">
            <span class="role">Assistant</span>
            <time class="time">Now</time>
          </div>
          <p>
            Ask me about NimbusDesk account management, billing, password reset, notifications, API usage,
            plans, data export, or security settings.
          </p>
        </article>
      </div>

      <div id="typingIndicator" class="typing hidden">
        <span></span><span></span><span></span>
        <p>Assistant is analyzing your question...</p>
      </div>

      <form id="chatForm" class="composer">
        <label for="messageInput" class="sr-only">Type your message</label>
        <textarea
          id="messageInput"
          name="message"
          rows="1"
          maxlength="1200"
          placeholder="Ask a product question..."
          required
        ></textarea>
        <button id="sendBtn" class="btn btn-primary" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
